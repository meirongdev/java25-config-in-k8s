apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-experiment
  labels:
    scenario: "10-g1gc-4c4g"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-experiment
  template:
    metadata:
      labels:
        app: java-experiment
    spec:
      containers:
        - name: app
          image: java-experiment:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseG1GC -XX:MaxRAMPercentage=75"
          resources:
            requests:
              memory: "4Gi"
              cpu: "4000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
---
apiVersion: v1
kind: Service
metadata:
  name: java-experiment
spec:
  selector:
    app: java-experiment
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
